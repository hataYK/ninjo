openapi: "3.0.3"
info:
  title: Ninjo API
  version: "1.0.0"
  description: 勉強計画を立て、AIと一緒に「やり切る」を実現するAPI

servers:
  - url: /api/v1

paths:
  /auth/signup:
    post:
      operationId: signup
      summary: ユーザー新規登録
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "201":
          description: 登録成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: メールアドレスが既に登録されている
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      summary: ログイン
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: ログイン成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          description: メールアドレスまたはパスワードが間違っている
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      summary: ログアウト
      tags: [auth]
      responses:
        "204":
          description: ログアウト成功

  /auth/refresh:
    post:
      operationId: refreshToken
      summary: アクセストークンを更新
      tags: [auth]
      responses:
        "200":
          description: トークン更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: リフレッシュトークンが無効または期限切れ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /avatar:
    get:
      operationId: getAvatar
      summary: アバター設定とスキルサマリーを取得
      tags: [avatar]
      security:
        - cookieAuth: []
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvatarResponse"
        "401":
          description: 未認証
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateAvatar
      summary: アバターのプリセットを設定/変更
      tags: [avatar]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAvatarRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvatarPresetResponse"
        "400":
          description: 無効なプリセットID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: 未認証
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /availability:
    get:
      operationId: getAvailability
      summary: 可処分時間設定を取得
      tags: [availability]
      security:
        - cookieAuth: []
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailabilityResponse"
        "401":
          description: 未認証
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateAvailability
      summary: 可処分時間設定を一括更新
      tags: [availability]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAvailabilityRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailabilityResponse"
        "400":
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: 未認証
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /plans:
    get:
      operationId: listPlans
      summary: 計画一覧を取得
      tags: [plan]
      security:
        - cookieAuth: []
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanListResponse"
        "401":
          description: 未認証
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createPlan
      summary: 計画を作成
      tags: [plan]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlanRequest"
      responses:
        "201":
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanResponse"
        "400":
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: 未認証
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /plans/review:
    post:
      operationId: reviewPlan
      summary: 計画をAIにレビューしてもらう（保存しない）
      tags: [plan]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlanRequest"
      responses:
        "200":
          description: レビュー結果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanReviewResponse"
        "400":
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: 未認証
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /plans/{plan_id}:
    get:
      operationId: getPlan
      summary: 計画の詳細を取得
      tags: [plan]
      security:
        - cookieAuth: []
      parameters:
        - name: plan_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanDetailResponse"
        "401":
          description: 未認証
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 計画が見つからない
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deletePlan
      summary: 計画を削除
      tags: [plan]
      security:
        - cookieAuth: []
      parameters:
        - name: plan_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: 削除成功
        "401":
          description: 未認証
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 計画が見つからない
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tasks/{task_id}/extract-skills:
    post:
      operationId: extractSkills
      summary: タスクのメモからAIがスキルを抽出（保存しない）
      tags: [skill]
      security:
        - cookieAuth: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 抽出成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractSkillsResponse"
        "400":
          description: メモが空
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: 未認証
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: タスクが存在しない
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /skills:
    get:
      operationId: listSkills
      summary: ユーザーの全スキル一覧を取得
      tags: [skill]
      security:
        - cookieAuth: []
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
          description: カテゴリでフィルタ
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillListResponse"
        "401":
          description: 未認証
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createSkill
      summary: スキルを手動追加
      tags: [skill]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSkillRequest"
      responses:
        "201":
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillResponse"
        "400":
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: 未認証
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: 同名スキルが既に存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /skills/{skill_id}:
    put:
      operationId: updateSkill
      summary: スキルの名前やカテゴリを更新
      tags: [skill]
      security:
        - cookieAuth: []
      parameters:
        - name: skill_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSkillRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillResponse"
        "400":
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: 未認証
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: スキルが見つからない
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteSkill
      summary: スキルを削除
      tags: [skill]
      security:
        - cookieAuth: []
      parameters:
        - name: skill_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: 削除成功
        "401":
          description: 未認証
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: スキルが見つからない
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /daily-tasks:
    get:
      operationId: listDailyTasks
      summary: 指定日のデイリータスク一覧を取得
      tags: [daily-task]
      security:
        - cookieAuth: []
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
          description: "対象日（YYYY-MM-DD）"
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyTaskListResponse"
        "400":
          description: 日付が不正
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: 未認証
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /daily-tasks/generate:
    post:
      operationId: generateDailyTasks
      summary: 指定日のデイリータスクを自動生成
      tags: [daily-task]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateDailyTasksRequest"
      responses:
        "201":
          description: 生成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyTaskListResponse"
        "400":
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: 未認証
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: 指定日のタスクが既に生成済み
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /daily-tasks/{task_id}:
    put:
      operationId: updateDailyTask
      summary: タスクのページ範囲を手動調整
      tags: [daily-task]
      security:
        - cookieAuth: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDailyTaskRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyTaskResponse"
        "400":
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: 未認証
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: タスクが見つからない
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /daily-tasks/{task_id}/complete:
    patch:
      operationId: completeDailyTask
      summary: タスクを完了にする
      tags: [daily-task]
      security:
        - cookieAuth: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteDailyTaskRequest"
      responses:
        "200":
          description: 完了成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyTaskResponse"
        "400":
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: 未認証
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: タスクが見つからない
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /health:
    get:
      operationId: healthCheck
      summary: ヘルスチェック
      tags: [system]
      responses:
        "200":
          description: サーバー稼働中
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

components:
  schemas:
    SignupRequest:
      type: object
      required: [email, password, display_name]
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          minLength: 8
        display_name:
          type: string
          minLength: 1
          maxLength: 100

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    UserResponse:
      type: object
      required: [id, email, display_name]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        display_name:
          type: string

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    AvailabilityItem:
      type: object
      required: [day_of_week, hours]
      properties:
        day_of_week:
          type: integer
          minimum: 0
          maximum: 6
          description: "Go time.Weekday 準拠（0=日曜, 1=月曜, ..., 6=土曜）"
        hours:
          type: number
          format: float
          minimum: 0
          maximum: 24
          description: "勉強可能時間（h）。0.5刻み"

    AvailabilityResponse:
      type: object
      required: [availability, weekly_total]
      properties:
        availability:
          type: array
          items:
            $ref: "#/components/schemas/AvailabilityItem"
          minItems: 7
          maxItems: 7
        weekly_total:
          type: number
          format: float

    UpdateAvailabilityRequest:
      type: object
      required: [availability]
      properties:
        availability:
          type: array
          items:
            $ref: "#/components/schemas/AvailabilityItem"
          minItems: 7
          maxItems: 7

    AvatarResponse:
      type: object
      required: [avatar_preset_id, skill_count, skill_categories]
      properties:
        avatar_preset_id:
          type: string
        skill_count:
          type: integer
        skill_categories:
          type: array
          items:
            $ref: "#/components/schemas/SkillCategoryCount"

    SkillCategoryCount:
      type: object
      required: [category, count]
      properties:
        category:
          type: string
        count:
          type: integer

    UpdateAvatarRequest:
      type: object
      required: [avatar_preset_id]
      properties:
        avatar_preset_id:
          type: string
          description: "preset_01 〜 preset_12"

    AvatarPresetResponse:
      type: object
      required: [avatar_preset_id]
      properties:
        avatar_preset_id:
          type: string

    CreatePlanRequest:
      type: object
      required: [title, total_pages, target_date]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        total_pages:
          type: integer
          minimum: 1
          maximum: 10000
        target_date:
          type: string
          format: date
          description: "目標期限（YYYY-MM-DD）。今日より後の日付"

    PlanReviewResponse:
      type: object
      required: [daily_pages, total_days, available_days, review_message]
      properties:
        daily_pages:
          type: number
          format: float
        total_days:
          type: integer
        available_days:
          type: integer
        review_message:
          type: string

    PlanResponse:
      type: object
      required: [id, title, total_pages, start_date, target_date, status, progress_rate, created_at]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        total_pages:
          type: integer
        start_date:
          type: string
          format: date
        target_date:
          type: string
          format: date
        status:
          type: string
          enum: [active, completed, paused]
        ai_review:
          type: string
        progress_rate:
          type: number
          format: float
        created_at:
          type: string
          format: date-time

    PlanDetailResponse:
      type: object
      required: [id, title, total_pages, start_date, target_date, status, progress_rate, daily_pages_needed, days_remaining, created_at]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        total_pages:
          type: integer
        start_date:
          type: string
          format: date
        target_date:
          type: string
          format: date
        status:
          type: string
          enum: [active, completed, paused]
        ai_review:
          type: string
        progress_rate:
          type: number
          format: float
        daily_pages_needed:
          type: number
          format: float
        days_remaining:
          type: integer
        created_at:
          type: string
          format: date-time

    PlanListResponse:
      type: object
      required: [plans]
      properties:
        plans:
          type: array
          items:
            $ref: "#/components/schemas/PlanResponse"

    ExtractSkillsResponse:
      type: object
      required: [suggested_skills]
      properties:
        suggested_skills:
          type: array
          items:
            $ref: "#/components/schemas/SuggestedSkill"

    SuggestedSkill:
      type: object
      required: [name, category]
      properties:
        name:
          type: string
        category:
          type: string

    CreateSkillRequest:
      type: object
      required: [name, category]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        category:
          type: string
          minLength: 1
          maxLength: 100
        task_id:
          type: string
          format: uuid
          description: タスクに紐付ける場合のみ指定

    UpdateSkillRequest:
      type: object
      required: [name, category]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        category:
          type: string
          minLength: 1
          maxLength: 100

    SkillResponse:
      type: object
      required: [id, name, category, source, created_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        category:
          type: string
        source:
          type: string
          enum: [ai, manual]
        task_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time

    SkillListResponse:
      type: object
      required: [skills, total_count]
      properties:
        skills:
          type: array
          items:
            $ref: "#/components/schemas/SkillResponse"
        total_count:
          type: integer

    GenerateDailyTasksRequest:
      type: object
      required: [date]
      properties:
        date:
          type: string
          format: date
          description: "対象日（YYYY-MM-DD）。今日以降の日付"

    UpdateDailyTaskRequest:
      type: object
      required: [start_page, end_page]
      properties:
        start_page:
          type: integer
          minimum: 1
        end_page:
          type: integer
          minimum: 1

    CompleteDailyTaskRequest:
      type: object
      required: [actual_end_page]
      properties:
        actual_end_page:
          type: integer
          minimum: 1
        memo:
          type: string
          maxLength: 5000

    DailyTaskResponse:
      type: object
      required: [id, plan_id, plan_title, date, start_page, end_page, is_completed, created_at]
      properties:
        id:
          type: string
          format: uuid
        plan_id:
          type: string
          format: uuid
        plan_title:
          type: string
        date:
          type: string
          format: date
        start_page:
          type: integer
        end_page:
          type: integer
        actual_end_page:
          type: integer
        is_completed:
          type: boolean
        memo:
          type: string
        completed_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    DailyTaskSummary:
      type: object
      required: [total, completed, total_pages]
      properties:
        total:
          type: integer
        completed:
          type: integer
        total_pages:
          type: integer

    DailyTaskListResponse:
      type: object
      required: [date, tasks, summary]
      properties:
        date:
          type: string
          format: date
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/DailyTaskResponse"
        summary:
          $ref: "#/components/schemas/DailyTaskSummary"

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: access_token
